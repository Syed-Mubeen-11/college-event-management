spring.application.name=event-management
# ===========================================
# DATABASE CONFIGURATION
# ===========================================

# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/event_management
spring.datasource.username=event_admin
spring.datasource.password=event12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================================
# SERVER CONFIGURATION
# ===========================================

server.port=8080

# ===========================================
# LOGGING
# ===========================================

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration
app.jwt.secret=b7f3d8e2a1c4f6e9d8b2a3c5f7e1d4b6a8c9e2f3d5g7h9j1k4l6m8n2p3q5r7s9t1u
app.jwt.expiration=86400000

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Certificate Storage
certificate.storage.path=certificates

# Super Admin Configuration
app.super-admin.secret-key=mysecretkey123
app.super-admin.email=superadmin@eventelite.com
app.super-admin.password=SuperAdmin@123